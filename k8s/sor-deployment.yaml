apiVersion: v1
kind: ConfigMap
metadata:
  name: sor-config
data:
  # JVM 参数配置
  JAVA_OPTS: |
    -server
    -XX:+UseZGC
    -XX:+ZGenerational
    -Xms8g -Xmx8g
    -XX:MaxDirectMemorySize=4g
    -Djava.awt.headless=true
  
  # 日志级别
  LOG_LEVEL: INFO

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sor-server
  labels:
    app: sor-server
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sor-server
  template:
    metadata:
      labels:
        app: sor-server
    spec:
      containers:
      - name: sor-server
        image: sor-server:latest
        ports:
        - containerPort: 9876
          name: fix-port
        - containerPort: 8080
          name: http-port
        env:
        - name: JAVA_OPTS
          valueFrom:
            configMapKeyRef:
              name: sor-config
              key: JAVA_OPTS
        resources:
          requests:
            memory: "8Gi"
            cpu: "4000m"
          limits:
            memory: "16Gi"
            cpu: "8000m"
        volumeMounts:
        - name: logs-volume
          mountPath: /app/logs
        livenessProbe:
          tcpSocket:
            port: 9876
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 9876
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: logs-volume
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - sor-server
              topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: sor-service
spec:
  selector:
    app: sor-server
  ports:
  - name: fix
    port: 9876
    targetPort: 9876
  - name: http
    port: 8080
    targetPort: 8080
  type: LoadBalancer

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sor-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sor-server
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
